[package]
name = "ateam"
version = "1.0.11"
authors = ["Andrea Frigido"]
license = "MIT"
description = "The tool that helps optimize the code review process."
documentation = "https://github.com/frisoft/ateam"
readme = "README.md"
edition = "2021"
keywords = ["cli", "github", "code-review", "pull-request", "command-line"]

[lib]
name = "ateam"
path = "src/lib.rs"

[[bin]]
name = "ateam"
path = "src/bin.rs"


# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[profile.dev]
split-debuginfo = "unpacked"
incremental = true

# generated by 'cargo dist init'
[profile.dist]
inherits = "release"
debug = true
split-debuginfo = "packed"

[dependencies]
anyhow = "^1.0.102"
graphql_client = "^0.14"
serde = "^1.0"
serde_json = "^1.0"
reqwest = { version = "^0.12", default-features = false, features = ["json", "rustls-tls"] }
terminal_size = "^0.4"
comfy-table = "^7.2.2"
dotenvy = "^0.15"
envy = "^0.4"
log = "^0.4"
env_logger = "^0.11.10"
chrono = { version = "^0.4.44", default-features = false, features = ["clock", "serde"] }
regex = "^1.12.3"
itertools = "^0.14"
clap = { version = "^4.6.0", features = ["derive"] }
tokio = { version = "^1.50.0", features = ["full"] }
futures = "^0.3.32"

